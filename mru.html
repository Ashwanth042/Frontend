 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Headings</title>
    <style>
        h1 {
            font-size: 3em;
            color: #2c3e50;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        h2 {
            font-size: 2.5em;
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        h3 {
            font-size: 2em;
            color: #e74c3c;
            text-transform: uppercase;
            position: relative;
        }
        h3::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 50px;
            height: 2px;
            background-color: #e74c3c;
        }
        h4 {
            font-size: 1.75em;
            color: #27ae60;
            font-style: italic;
        }
        h5 {
            font-size: 1.5em;
            color: #8e44ad;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h6 {
            font-size: 1.25em;
            color: #d35400;
            font-weight: bold;
        }
    </style>
</head>
<body>
<b><i>Welcome to Malla Reddy University!</i></b>
    <h1><i>Courses:</i></h1>
    <h2>CSE - Computer Science and Engineering</h2>
    <h3>DS - Data Science</h3>
    <h4>AI & ML - Artificial Intelligence and Machine Learning</h4>
    <h5>IT - Information Technology</h5>
    <h6>ECE - Electronics and Communications Engineering</h6>
</body>
</html>
